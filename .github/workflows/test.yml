name: Run Test Suite

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        name: Checkout repository

      - name: Copy environment variables
        run: cp .env.example .env

      - name: Start Docker services
        run: docker compose up -d

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Generate Build Info
        run: bash create_build_info.sh

      - name: Clean and Fix Permissions
        run: |
          sudo chown -R $(id -u):$(id -g) . || true
          STORE_PATH=$(pnpm store path 2>/dev/null || echo "~/.local/share/pnpm/store")
          sudo mkdir -p "$STORE_PATH"
          sudo chown -R $(id -u):$(id -g) "$STORE_PATH" || true
          sudo rm -rf node_modules

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test
